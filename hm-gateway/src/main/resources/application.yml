server:
  port: 8081
spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 192.168.133.126:8848
    gateway:
      routes:
        - id: item # 路由规则ID，自定义，唯一
          uri: lb://item-service # 路由的目标服务，lb代表负载均衡，会从注册中心拉取服务列表
          predicates: # 路由断言，判断请求是否符合当前规则，符合则路由到目标服务
            - Path=/items/** # Path为路由断言，判断请求路径是否符合规则
        - id: cart
          uri: lb://cart-service
          predicates:
            - Path=/carts/**
        - id: search
          uri: lb://search-service
          predicates:
            - Path=/search/**
        - id: user
          uri: lb://user-service
          predicates:
            - Path=/users/**,/addressses/**
        - id: trade
          uri: lb://trade-service
          predicates:
            - Path=/orders/**
        - id: pay
          uri: lb://pay-service
          predicates:
            - Path=/pay-orders/**
# 其他配置不变
hm:
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    password: hmall123
    tokenTTL: 30m
  auth:
    excludePaths:
      - /search/**
      - /users/login
      - /api/users/login  # 新增，让JWT过滤器放行这个路径
      - /items/**
      - /hias hmall -keyalg RSA -keypass hmall123 -keystore hmall.jks -storepass hmall123